<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Boxr</title>
  <link rel="stylesheet" href="https://cdn.simplecss.org/simple-v1.css">
  <style>
    form {
      display: grid;
      gap: 10px;
      width: 500px;
      grid-template-columns: 1fr 1fr 1fr 1fr;
    }

    input[type=checkbox] { display: none; }

    label {
      position: relative;
      display: block;
      width: 100%;
      aspect-ratio: 4 / 5;
      cursor: pointer;
      order: var(--rand);
      border-radius: 6px;
      overflow: hidden;
    }

    label img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.2s;
    }

    /* Card back: always on top until checked */
    .back  { z-index: 2; opacity: 1; }
    .front { z-index: 1; opacity: 0; }

    /* Flip: show front, hide back */
    input[type=checkbox]:checked + label .back  { opacity: 0; }
    input[type=checkbox]:checked + label .front { opacity: 1; }

    /* ── Matched pairs: both checked → green outline ── */

    /* seed 5  — c1 + c2 */
    #c1:checked ~ #c2:checked + label,
    #c2:checked ~ * #c1:checked + label { outline: 4px solid green; }
    #c1:checked ~ #c2:checked ~ * #c1:checked + label { outline: 4px solid green; }

    /* The trick: when BOTH are checked, target both labels.
       We use the fact that checkboxes are siblings in the form. */

    /* seed 5 */
    #c1:checked ~ #c2:checked + label { outline: 4px solid green; }
    #c2:checked ~ #c1 + label         { outline: 4px solid green; }
    /* but #c2 comes after #c1 in DOM, so only forward sibling works cleanly.
       We'll use a different approach: a wrapper div per pair + :has() */
  </style>
</head>
<body>
  <header><h1>Boxr</h1></header>
  <main>
    <!--
      Strategy: wrap each PAIR in a div.pair.
      When both checkboxes inside are :checked, :has() lets us
      style the labels as matched — pure CSS, no JS.
    -->
    <style>
      .pair { display: contents; } /* doesn't break the grid */

      /* When BOTH checkboxes in a pair are checked → matched state */
      .pair:has(input:nth-child(1):checked):has(input:nth-child(3):checked) label {
        visibility: hidden;
      }
    </style>
    <form>

      <!-- PAIR: seed 5 -->
      <div class="pair">
        <input type="checkbox" id="c1">
        <label for="c1" style="--rand:5">
          <img src="https://picsum.photos/id/210/200/300" class="back">
          <img src="https://picsum.photos/seed/5/200/300"    class="front">
        </label>
        <input type="checkbox" id="c2">
        <label for="c2" style="--rand:2">
          <img src="https://picsum.photos/id/210/200/300" class="back">
          <img src="https://picsum.photos/seed/5/200/300"    class="front">
        </label>
      </div>

      <!-- PAIR: seed 10 -->
      <div class="pair">
        <input type="checkbox" id="c3">
        <label for="c3" style="--rand:8">
          <img src="https://picsum.photos/id/210/200/300" class="back">
          <img src="https://picsum.photos/seed/10/200/300"   class="front">
        </label>
        <input type="checkbox" id="c4">
        <label for="c4" style="--rand:9">
          <img src="https://picsum.photos/id/210/200/300" class="back">
          <img src="https://picsum.photos/seed/10/200/300"   class="front">
        </label>
      </div>

      <!-- PAIR: seed 15 -->
      <div class="pair">
        <input type="checkbox" id="c5">
        <label for="c5" style="--rand:4">
          <img src="https://picsum.photos/id/210/200/300" class="back">
          <img src="https://picsum.photos/seed/15/200/300"   class="front">
        </label>
        <input type="checkbox" id="c6">
        <label for="c6" style="--rand:7">
          <img src="https://picsum.photos/id/210/200/300" class="back">
          <img src="https://picsum.photos/seed/15/200/300"   class="front">
        </label>
      </div>

      <!-- PAIR: seed 20 -->
      <div class="pair">
        <input type="checkbox" id="c7">
        <label for="c7" style="--rand:12">
          <img src="https://picsum.photos/id/210/200/300" class="back">
          <img src="https://picsum.photos/seed/20/200/300"   class="front">
        </label>
        <input type="checkbox" id="c8">
        <label for="c8" style="--rand:6">
          <img src="https://picsum.photos/id/210/200/300" class="back">
          <img src="https://picsum.photos/seed/20/200/300"   class="front">
        </label>
      </div>

      <!-- PAIR: seed 25 -->
      <div class="pair">
        <input type="checkbox" id="c9">
        <label for="c9" style="--rand:1">
          <img src="https://picsum.photos/id/210/200/300" class="back">
          <img src="https://picsum.photos/seed/25/200/300"   class="front">
        </label>
        <input type="checkbox" id="c10">
        <label for="c10" style="--rand:10">
          <img src="https://picsum.photos/id/210/200/300" class="back">
          <img src="https://picsum.photos/seed/25/200/300"   class="front">
        </label>
      </div>

      <!-- PAIR: seed 30 -->
      <div class="pair">
        <input type="checkbox" id="c11">
        <label for="c11" style="--rand:11">
          <img src="https://picsum.photos/id/210/200/300" class="back">
          <img src="https://picsum.photos/seed/30/200/300"   class="front">
        </label>
        <input type="checkbox" id="c12">
        <label for="c12" style="--rand:3">
          <img src="https://picsum.photos/id/210/200/300" class="back">
          <img src="https://picsum.photos/seed/30/200/300"   class="front">
        </label>
      </div>

    </form>
  </main>
</body>
</html>
