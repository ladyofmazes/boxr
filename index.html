<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Boxr</title>
  <link rel="stylesheet" href="https://cdn.simplecss.org/simple-v1.css">
  <style>

    /* --- START BUTTON --- */
    #start-btn { display: none; }

    .start-label {
      position: absolute;
      inset: 0;
      z-index: 100;
      cursor: pointer;
      background: rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
      text-shadow: 1px 1px 5px black;
    }

    #start-btn:checked ~ form .gallery img {
      animation-play-state: paused;
    }

    #start-btn:checked + .start-label {
      display: none;
      pointer-events: none;
    }

    /* --- CARD COUNT SELECTOR --- */
    .count-radios { display: none; }

    .count-controls {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    .count-controls span {
      font-size: 0.9em;
    }

    .count-controls label {
      display: inline-block;
      padding: 4px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.5em;
      aspect-ratio: unset;
      width: auto;
      position: static;
      overflow: visible;
      order: unset;
    }

    .count-radios:checked + .count-controls label { background: none; }

    #count-2:checked ~ .count-controls label[for="count-2"],
    #count-4:checked ~ .count-controls label[for="count-4"],
    #count-6:checked ~ .count-controls label[for="count-6"],
    #count-8:checked ~ .count-controls label[for="count-8"],
    #count-10:checked ~ .count-controls label[for="count-10"],
    #count-20:checked ~ .count-controls label[for="count-20"],
    #count-50:checked ~ .count-controls label[for="count-50"],
    #count-100:checked ~ .count-controls label[for="count-100"],
    #count-500:checked ~ .count-controls label[for="count-500"],
    #count-1000:checked ~ .count-controls label[for="count-1000"] {
      background: #555;
      color: white;
      border-color: #555;
    }

    /* Hide pairs beyond the selected count */
    #count-2:checked  ~ form .pair:nth-of-type(n+2) { display: none; }
    #count-4:checked  ~ form .pair:nth-of-type(n+3) { display: none; }
    #count-6:checked  ~ form .pair:nth-of-type(n+4) { display: none; }
    #count-8:checked  ~ form .pair:nth-of-type(n+5) { display: none; }
    #count-10:checked ~ form .pair:nth-of-type(n+6) { display: none; }
    #count-20:checked ~ form .pair:nth-of-type(n+11) { display: none; }
    #count-50:checked ~ form .pair:nth-of-type(n+26) { display: none; }
    #count-100:checked ~ form .pair:nth-of-type(n+51) { display: none; }
    #count-500:checked ~ form .pair:nth-of-type(n+251) { display: none; }
    /* count-1000 = show all, no rule needed */

    /* --- LAYOUT --- */
    main {
      position: relative;
      width: 500px;
    }

    form {
      display: grid;
      gap: 10px;
      width: 500px;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      position: relative;
    }

    /* --- CARD --- */
    input[type=checkbox] { display: none; }

    label {
      position: relative;
      display: block;
      width: 100%;
      aspect-ratio: 4 / 5;
      cursor: pointer;
      order: var(--rand);
      border-radius: 6px;
      overflow: hidden;
    }

    label img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .back        { z-index: 2; opacity: 1; }
    .gallery img:not(.back) { z-index: 1; opacity: 0; }

    /* --- SHUFFLE ANIMATION --- */
    @keyframes shuffle {
      0%, 20%    { opacity: 1; }
      20.01%, 100% { opacity: 0; }
    }

    .gallery img:nth-child(2) { animation: shuffle 1s  0.00s infinite; }
    .gallery img:nth-child(3) { animation: shuffle 1s  0.20s infinite; }
    .gallery img:nth-child(4) { animation: shuffle 1s  0.40s infinite; }
    .gallery img:nth-child(5) { animation: shuffle 1s  0.60s infinite; }
    .gallery img:nth-child(6) { animation: shuffle 1s  0.80s infinite; }

    /* --- MATCH LOGIC --- */
    input:checked + label .back { opacity: 0; }

    .pair:has(input:checked) ~ .pair:has(input:checked) ~ .pair:has(input:checked) input:checked + label .back        { opacity: 1; }
    .pair:has(input:checked) ~ .pair:has(input:checked) ~ .pair:has(input:checked) input:checked + label img:not(.back) { opacity: 0; }

    .pair:has(input:first-of-type:checked):has(input:last-of-type:checked) label {
      opacity: 0;
    }

    .pair { display: contents; }

  </style>
</head>
