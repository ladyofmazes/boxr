<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Boxr</title>
  <link rel="stylesheet" href="https://cdn.simplecss.org/simple-v1.css">
  <style>
    form {
      display: grid;
      gap: 10px;
      width: 500px;
      grid-template-columns: 1fr 1fr 1fr 1fr;
    }

    input[type=checkbox] { display: none; }

    label {
      position: relative;
      display: block;
      width: 100%;
      aspect-ratio: 4 / 5;
      cursor: pointer;
      order: var(--rand);
      border-radius: 6px;
      overflow: hidden;
    }

    label img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.2s;
    }
    
    /* Calculated timing for each frame (1s total / 10 frames) */
    .gallery img:nth-child(2) { animation-delay: 0.00s; animation-name: shuffle; animation-duration: 1s; animation-iteration-count: infinite;}
    .gallery img:nth-child(3) { animation-delay: 0.20s; animation-name: shuffle; animation-duration: 1s; animation-iteration-count: infinite;}
    .gallery img:nth-child(4) { animation-delay: 0.40s; animation-name: shuffle; animation-duration: 1s; animation-iteration-count: infinite;}
    .gallery img:nth-child(5) { animation-delay: 0.60s; animation-name: shuffle; animation-duration: 1s; animation-iteration-count: infinite;}
    .gallery img:nth-child(6) { animation-delay: 0.80s; animation-name: shuffle; animation-duration: 1s; animation-iteration-count: infinite;}
    
    /* The Stop Logic */
    form:has(input:checked) .gallery img { animation-play-state: paused; }

    /* The visibility toggle (20% window for each of the 5 frames) */
    @keyframes shuffle { 
      0%, 20.0% { opacity: 1; } 
      20.01%, 100% { opacity: 0; } 
    }

    .back  { z-index: 2; opacity: 1; }
    .front { z-index: 1; opacity: 0; }

    /* Flip a single card */
    input:checked + label .back  { opacity: 0; }
    /*input:checked + label .front { opacity: 1; }*/

    /* Rule 1: if a THIRD pair has any checked card, flip it back */
    .pair:has(input:checked) ~ .pair:has(input:checked) ~ .pair:has(input:checked) input:checked + label .back  { opacity: 1; }
    .pair:has(input:checked) ~ .pair:has(input:checked) ~ .pair:has(input:checked) input:checked + label .front { opacity: 0; }

    /* Rule 2: if both cards in a pair are checked, hide the whole pair */
    .pair:has(input:first-of-type:checked):has(input:last-of-type:checked) label {
      visibility: hidden;
    }

    .pair { display: contents; }
  </style>
</head>

      <!-- PAIR: seed 5 -->
